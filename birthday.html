<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 生日快乐！</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: #fff;
            background: #1a1a2e; /* 图片加载前或失败时的底色 */
        }
        /* 👇 核心修改：用 img 标签做背景 */
        .bg-img {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        /* 图片加载失败时的占位提示 */
        .image-placeholder {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: none; /* 默认隐藏，onerror 时显示 */
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            opacity: 0.8;
            z-index: 0;
        }
        /* 半透明遮罩，保证文字清晰 */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }
        .card {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 50px 40px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: float 3s ease-in-out infinite;
            max-width: 500px;
            margin: 20px;
        }
        .cake { font-size: 80px; margin-bottom: 20px; animation: bounce 1s ease infinite; }
        h1 { font-size: 2.5em; margin-bottom: 15px; background: linear-gradient(90deg, #f9d423, #ff4e50); -webkit-background-clip: text; background-clip: text;  -webkit-text-fill-color: transparent; }
        p { font-size: 1.2em; line-height: 1.8; opacity: 0.95; margin-bottom: 25px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(90deg, #f9d423, #ff4e50);
            border: none;
            border-radius: 50px;
            color: #1a1a2e;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover { transform: scale(1.08); box-shadow: 0 8px 30px rgba(255,78,80,0.6); }
        .confetti { position: fixed; top: -10px; width: 10px; height: 10px; border-radius: 50%; animation: fall linear forwards; pointer-events: none; z-index: 10; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes bounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>
    <!-- 👇 背景图用 img 标签，带 onerror 容错 -->
    <img class="bg-img" 
         src="D:/Downloads/晚晚/background.jpg" 
         alt="兮子cc" 
         onerror="this.style.display='none'; this.parentNode.querySelector('.image-placeholder').style.display='flex';">
    
    <!-- 图片加载失败时的占位 -->
    <div class="image-placeholder">🎂 图片走丢啦，但祝福不会！</div>
    
    <!-- 遮罩层 -->
    <div class="overlay"></div>

    <div class="card">
        <div class="cake">🎂</div>
        <h1>生日快乐呀！</h1>
        <p>
            愿你的每一天都闪闪发光 ✨<br>
            新的一岁，平安喜乐，万事胜意 🎉<br>
            永远做那个快乐的小孩 🎈
        </p>
        <button class="btn" onclick="launchConfetti()">🎁 点我领祝福</button>
    </div>

    <script>
        function launchConfetti() {
            const colors = ['#f9d423','#ff4e50','#43e97b','#38f9d7','#fa709a','#fee140'];
            for (let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                c.style.width = c.style.height = (Math.random() * 8 + 6) + 'px';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }
        setTimeout(launchConfetti, 800);
    </script>
</body>
</html>
